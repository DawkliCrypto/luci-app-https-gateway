name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  PKG_NAME: luci-app-https-gateway
  OPENWRT_VERSION: "25.12.4"

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64_cortex-a53
            sdk_target: mediatek/filogic
            sdk_name: openwrt-sdk-25.12.4-mediatek-filogic_gcc-14.3.0_musl.Linux-x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential gawk unzip file wget \
            python3 libncurses-dev zstd swig > /dev/null

      - name: Cache OpenWrt SDK
        uses: actions/cache@v4
        id: cache-sdk
        with:
          path: sdk
          key: openwrt-sdk-${{ matrix.sdk_name }}-feeds-v2

      - name: Download OpenWrt SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          SDK_URL="https://downloads.openwrt.org/releases/${{ env.OPENWRT_VERSION }}/targets/${{ matrix.sdk_target }}/${{ matrix.sdk_name }}.tar.zst"
          wget -q "$SDK_URL" -O sdk.tar.zst
          mkdir -p sdk
          tar -xf sdk.tar.zst --strip-components=1 -C sdk
          rm sdk.tar.zst

      - name: Update feeds (only on cache miss)
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        working-directory: sdk
        run: |
          # Only install luci feed - that's all we need for luci.mk
          sed -i '/^src-git/!d' feeds.conf.default
          ./scripts/feeds update luci base -a 2>/dev/null || true
          ./scripts/feeds install luci-base

      - name: Prepare package source
        run: |
          rm -rf sdk/package/${{ env.PKG_NAME }}
          mkdir -p sdk/package/${{ env.PKG_NAME }}
          cp -r src Makefile sdk/package/${{ env.PKG_NAME }}/
          sed -i "s/^PKG_VERSION:=.*/PKG_VERSION:=${{ steps.version.outputs.version }}/" \
            sdk/package/${{ env.PKG_NAME }}/Makefile

      - name: Build package
        working-directory: sdk
        run: |
          echo "CONFIG_PACKAGE_luci-app-https-gateway=y" > .config
          make defconfig 2>/dev/null
          make package/${{ env.PKG_NAME }}/compile V=s -j$(nproc) || \
          make package/${{ env.PKG_NAME }}/compile V=s -j1

      - name: Collect artifacts
        run: |
          mkdir -p dist
          find sdk/bin -name "${PKG_NAME}*.apk" -exec cp {} dist/ \;
          for f in dist/*.apk; do
            [ -f "$f" ] || continue
            base=$(basename "$f" .apk)
            mv "$f" "dist/${base}_${{ matrix.arch }}.apk"
          done
          ls -la dist/

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ matrix.arch }}
          path: dist/*.apk

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Prepare release assets
        run: |
          mkdir -p release
          cp artifacts/*.apk release/ 2>/dev/null || true
          VERSION="${{ steps.version.outputs.version }}"
          ARCHIVE="${{ env.PKG_NAME }}_${VERSION}_src.tar.gz"
          mkdir -p "tmp/${{ env.PKG_NAME }}"
          cp -r src Makefile "tmp/${{ env.PKG_NAME }}/"
          tar -czf "release/${ARCHIVE}" -C tmp "${{ env.PKG_NAME }}"
          ls -la release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Installation

            ```sh
            # Download the .apk matching your architecture, then:
            apk add --allow-untrusted luci-app-https-gateway-*.apk
            ```

            ## Build from source (OpenWrt SDK)
            ```sh
            tar -xzf ${{ env.PKG_NAME }}_${{ steps.version.outputs.version }}_src.tar.gz -C package/
            make package/${{ env.PKG_NAME }}/compile
            ```
          files: release/*
